作階段 ID）有助於進一步查核日誌。</p>", "p543": "<h3>表單送出錯誤（三）：日誌範例</h3><p>日誌範例：[form_hardening:error]... Form validation failed: Token is not valid for URL /DVWA/vulnerabilities/upload/（預期為 /DVWA/vulnerabilities/upload/#）。</p>", "p544": "<h3>表單送出錯誤（四）：完整日誌</h3><p>完整日誌範例包含時間戳記、來源／本機 IP、方法（POST）、狀態碼（400）、原因（Form Hardening）、URL 與伺服器等詳細資訊。</p>", "p545": "<h3>表單送出錯誤（五）：解決方式</h3><p>表單強化錯誤須於防火牆規則中新增例外項目；檢視發生錯誤的 URL 可發現其中包含可變動參數，因此建立例外時的路徑須加入萬用字元以涵蓋此情況。</p>", "p546": "<h3>表單送出錯誤（六）：例外設定</h3><p>於例外設定中新增一或多個適用路徑，並選擇要略過的檢查項目；針對此問題還須勾選進階區塊中的選項——「靜態 URL 強化或表單強化時永不變更 HTML」，啟用此選項後，符合所定義例外設定的資料將不會被 Sophos Firewall 修改。</p>", "p547": "<h3>表單送出錯誤（七）：解決確認</h3><p>建立例外後，表單現已能如預期正常運作。</p>", "p548": "<h3>疑難排解威脅過濾規則</h3><p>接下來說明如何疑難排解威脅過濾規則相關問題。</p>", "p549": "<h3>威脅過濾規則等級</h3><p>等級 1：標準安全需求，產生極少誤判。等級 2：提供較佳安全涵蓋範圍與較高安全需求，可能產生額外誤判。等級 3：適用更高安全需求，須依處理誤判的經驗調整。</p>", "p550": "<h3>通訊協定強制執行</h3><p>強制遵守 HTTP 與 HTTPS 通訊協定的 RFC 標準，違反這些標準通常代表惡意意圖；搜尋常見使用樣式（如 Host、User-Agent 等 HTTP 標頭），缺乏這類樣式的請求通常代表惡意請求；並對請求參數的數量與範圍施加合理限制。</p>", "p551": "<h3>拒絕存取錯誤（一）</h3><p>使用者在某網站送出表單時，可能看到如圖所示的錯誤畫面。</p>", "p552": "<h3>拒絕存取錯誤（二）</h3><p>於日誌檢視器可看到 WAF 異常錯誤、URL 與防火牆 ID，惟無法從此處直接判定觸發的是哪一條威脅過濾規則。</p>", "p553": "<h3>拒絕存取錯誤（三）：日誌範例</h3><p>日誌範例：[security2:error]... ModSecurity: Warning. Found 1 byte(s) in REQUEST_BODY outside range...，顯示觸發的具體規則相關資訊。</p>", "p554": "<h3>拒絕存取錯誤（四）：異常分數</h3><p>日誌顯示 ModSecurity 警告：Operator GE matched 5 at TX:inbound_anomaly_score，可看到觸發規則的檔案（RESPONSE-980-CORRELATION.conf）與規則 ID（980...）等詳細資訊。</p>", "p555": "<h3>拒絕存取錯誤（五）：解決方式</h3><p>要解決此問題，可將該威脅過濾規則加入防護政策的略過過濾規則清單中；可能需先確認防火牆規則使用的是哪個防護政策。</p>", "p556": "<h3>拒絕存取錯誤（六）：問題解決</h3><p>略過此過濾規則後，問題即可解決。</p>", "p557": "<h3>疑難排解 GeoIP 封鎖</h3><p>接下來說明如何疑難排解 GeoIP 封鎖相關問題。</p>", "p558": "<h3>拒絕存取錯誤（一）：GeoIP</h3><p>遭 GeoIP 封鎖時，使用者會看到 403 拒絕存取頁面。</p>", "p559": "<h3>拒絕存取錯誤（二）：狀態碼</h3><p>日誌範例：[authz_core:error]... AH01630: client denied by server configuration，並顯示狀態碼 403、來源 IP（172.202.31.177）等相關資訊。</p>", "p560": "<h3>拒絕存取錯誤（三）：查詢國家</h3><p>可用主控台指令查詢某 IP 位址對應的國家，協助排解 GeoIP 封鎖相關的存取問題：show country-host ip2country ipaddress [IP位址]，範例顯示該 IP 屬於美國。</p>", "p561": "<h3>拒絕存取錯誤（四）：檢查規則設定</h3><p>須檢查防火牆規則設定中的「存取權限」區塊，本例中「已封鎖國家」欄位設定有誤。</p>", "p562": "<h3>拒絕存取錯誤（五）：問題解決</h3><p>修正已封鎖國家的設定後，網站即可正常存取。</p>", "p563": "<h3>章節回顧</h3><p>與 URL 強化相關的錯誤通常會顯示「no signature found」訊息，須確保已新增所有進入點 URL（區分大小寫）。表單強化問題會於日誌中顯示表單驗證錯誤，使用者可能看到「your browser sent a request this server could not understand」錯誤。</p>", "p564": "<h3>章節結尾</h3><p>（Troubleshooting Web Server Protection 章節結束）</p>", "p565": "<h3>章節封面</h3><p>Troubleshooting Sophos Firewall Web Server Authentication（Web 伺服器驗證疑難排解），課程代碼 FW6025，發布於 2026 年 4 月。</p>", "p566": "<h3>章節導讀</h3><p>本章說明如何排解 Sophos Firewall 上的 Web 伺服器驗證問題。建議先備知識：如何在 Sophos Firewall 上設定 Web 伺服器驗證。本章預計學習時間：4 分鐘。</p>", "p567": "<h3>Web 伺服器驗證流程</h3><p>① 使用者存取網站並輸入帳密登入；② Sophos Firewall 驗證使用者身分；③ Sophos Firewall 以基本驗證方式，將帳密資訊隨 Web 請求一併傳送給 Web 伺服器；④ Web 伺服器驗證使用者身分。啟用 Web 伺服器驗證可強制使用者先通過驗證。</p>", "p568": "<h3>Web 伺服器驗證設定</h3><p>驗證政策控制 Sophos Firewall 如何實作 Web 伺服器驗證：可顯示表單或使用基本驗證彈出視窗；可選擇以基本驗證轉送帳密，或不轉送；定義哪些使用者可通過驗證；並可選擇性加上前綴或後綴。</p>", "p569": "<h3>Web 伺服器驗證設定：套用位置</h3><p>驗證政策可設定於 Web 伺服器防護的防火牆規則中，若已啟用路徑特定路由，則可依各路徑分別設定。</p>", "p570": "<h3>情境：使用者無法驗證（一）</h3><p>登入已啟用 Web 伺服器驗證的網站時，使用者被要求重新登入，或看到未授權錯誤。</p>", "p571": "<h3>情境：使用者無法驗證（二）：日誌檢視</h3><p>檢視日誌檢視器，可看到該使用者已成功通過驗證，代表問題很可能出在 Web 伺服器端，而非 Sophos Firewall。</p>", "p572": "<h3>情境：使用者無法驗證（三）：檢查 Web 伺服器日誌</h3><p>下一步是檢查 Web 伺服器端的日誌，範例顯示：[auth_basic:error]... AH01618: user frogers not found: /auth，代表 Web 伺服器端驗證該使用者失敗。</p>", "p573": "<h3>情境：使用者無法驗證（四）：其他可能原因</h3><p>另一種可能原因是該網站不支援基本驗證，須另行啟用。</p>", "p574": "<h3>情境：使用者無法驗證（五）：問題解決</h3><p>修正 Web 伺服器端的驗證設定後，使用者即可成功登入。</p>", "p575": "<h3>章節回顧</h3><p>Web 伺服器驗證要求使用者須先通過驗證，防火牆才會將其連線代理轉送至 Web 伺服器；通過防火牆驗證後，可透過基本驗證將帳密轉送給 Web 伺服器。驗證政策控制 Sophos Firewall 驗證使用者的方式。</p>", "p576": "<h3>章節結尾</h3><p>（Troubleshooting Sophos Firewall Web Server Authentication 章節結束，亦為「Web 伺服器防護」模組結束）</p>", "p577": "<h3>章節封面</h3><p>Troubleshooting Sophos Firewall High Availability（高可用性疑難排解），課程代碼 FW7020，發布於 2025 年 12 月，版本 22.0v1。</p>", "p578": "<h3>章節導讀</h3><p>本章說明 Sophos Firewall 如何建立 HA 叢集，以及如何排解啟用 HA 與 HA 容錯移轉時的常見問題。建議先備知識：如何部署 Sophos Firewall；如何以高可用性方式部署 Sophos Firewall。本章預計學習時間：10 分鐘。</p>", "p579": "<h3>高可用性需求</h3><p>兩台設備須為相同機型；兩台設備須為相同韌體版本；HA 專用連接埠須位於 DMZ 區域；該區域須啟用 SSH 存取；WAN 連結不應設定 DHCP 或 PPPoE；HA 專用連接埠不應設定別名。</p>", "p580": "<h3>部署流程：健全性檢查</h3><p>啟用 HA 後，兩台裝置會開始建立 HA 叢集的流程：健全性檢查（Sanity Check）——檢查機型與韌體版本、確認輔助裝置的 HA 已停用、確認所有監控埠皆已啟動、確認 HA 埠無別名／VLAN／MAC 覆寫、以密語連線至輔助裝置的 22 埠。</p>", "p581": "<h3>部署流程：準備階段</h3><p>準備階段：與輔助裝置同步設定檔；此階段確保兩台裝置在正式組成叢集前，設定與狀態皆已對齊。</p>", "p582": "<h3>部署流程：完成組建</h3><p>準備完成後，即進入叢集組建的最終階段，完成 HA 配對的建立。</p>", "p583": "<h3>日誌檔案</h3><p>可於日誌檢視器的 SYSTEM 模組中找到 HA 相關日誌，篩選 HA 元件即可查看。相關日誌檔案：/log/ha.log（主要 HA 日誌檔）、/log/msync.log（HA 同步服務）、/log/ctsyncd.log（連線追蹤同步服務）、/log/applog.log（HA 設定與狀態更新）、/log/csc.log（管理所有服務的中央服務）。</p>", "p584": "<h3>無法啟用高可用性（一）</h3><p>範例：嘗試設定高可用性時看到「HA could not be enabled」的錯誤訊息。</p>", "p585": "<h3>無法啟用高可用性（二）：排查步驟</h3><p>排查步驟：確認已符合所有 HA 先決條件；確認 HA 設定中使用的密語正確；檢查是否能連線至輔助設備的 LAN IP 與專用 IP 位址；檢查 applog.log 是否含有啟用時執行檢查的結果。</p>", "p586": "<h3>無法啟用高可用性（三）：SSH 權限缺失</h3><p>檢視輔助裝置的設定後發現：HA 區域尚未啟用 SSH 存取，此選項必須啟用才能繼續。</p>", "p587": "<h3>無法啟用高可用性（四）：問題解決</h3><p>修正後，高可用性即可成功啟用。</p>", "p588": "<h3>HA 主控台指令</h3><p>啟用後可用主控台指令 system ha show details 檢查 HA 狀態；「system ha」指令可用於：停用 HA（system ha disable）、啟用／停用主動—主動叢集的負載平衡（load-balancing on/off）、顯示 HA 詳細資訊、追蹤 HA 日誌（show logs lines 5000）。</p>", "p589": "<h3>兩台裝置皆變成主要裝置（一）</h3><p>啟用後，連接埠與線纜的硬體問題可能導致相關故障。若 HA 專用埠或纜線故障，兩台設備會互相認定對方為故障狀態；這通常代表 HA 專用埠或纜線本身出現問題，並會出現路由問題，因兩台裝置皆會發送 ARP 以爭奪虛擬 MAC 的擁有權。</p>", "p590": "<h3>兩台裝置皆變成主要裝置（二）：日誌範例</h3><p>HA 專用埠故障會導致兩台設備各自轉為獨立的主要裝置狀態。日誌範例（主要裝置）：handle_stat_change: 3:2（狀態代碼說明：NA=0、AUX=1、STAND=2、PRIM=3、FAULT=4、READY=5、GOTO_PRIM=6）；輔助裝置端日誌亦顯示對應的狀態變更。</p>", "p591": "<h3>兩台裝置皆變成主要裝置（三）：解決方式</h3><p>此範例的問題出在纜線故障；更換纜線並重新啟動或重新連接原本關機／斷線的裝置後，HA 配對即可恢復正常上線狀態。若裝置並非直接相連，此問題也可能是交換器或虛擬交換器設定錯誤所致。</p>", "p592": "<h3>主要裝置容錯移轉至輔助裝置（一）</h3><p>範例：主要裝置已容錯移轉至輔助裝置，須進一步調查發生原因。</p>", "p593": "<h3>主要裝置容錯移轉至輔助裝置（二）：檢視方式</h3><p>可用 HA 設定中定義的對等體管理 IP 位址，連線至故障裝置的 Web 管理主控台；控制中心可能會顯示問題原因的線索，例如介面小工具顯示紅色狀態，點擊即可查看該介面的詳細資訊。</p>", "p594": "<h3>主要裝置容錯移轉至輔助裝置（三）：檢查連接埠狀態</h3><p>可用 dmesg 指令檢查連接埠狀態：dmesg | grep PortE，範例顯示 PortE 網卡連結多次中斷與恢復的紀錄（NIC Link is Down／Up），有助於判斷實體連線是否不穩定。</p>", "p595": "<h3>主要裝置容錯移轉至輔助裝置（四）：檢查封包統計</h3><p>可用 ifconfig 或 show network interfaces 指令檢查介面的封包遺失、錯誤與碰撞情形，範例展示 PortE 的介面統計資訊，包含 MAC 位址、IP 位址、接收封包數等。</p>", "p596": "<h3>主要裝置容錯移轉至輔助裝置（五）：問題解決</h3><p>本例透過更換故障纜線解決問題，更換後該裝置重新恢復為 HA 配對中的輔助裝置角色。</p>", "p597": "<h3>章節回顧</h3><p>要在 Sophos Firewall 上啟用 HA，兩台裝置須為相同機型與韌體版本，MTU、MSS、連結速度與雙工設定須維持預設值，WAN 連結須使用靜態 IP 位址，且 HA 埠須位於已啟用 SSH 的 DMZ 區域。建立 HA 叢集時，首先由 CSC 服務執行健全性檢查。</p>", "p598": "<h3>章節結尾</h3><p>（Troubleshooting Sophos Firewall High Availability 章節結束，亦為「高可用性」模組結束）</p>", "p599": "<h3>實作任務</h3><p>完成「高可用性」模組的實作任務：任務一：無法啟用高可用性。實作任務詳細資訊請參見課程資源中的實作手冊。</p>", "p601": "<h3>章節封面</h3><p>Troubleshooting Reports on Sophos Firewall（報告疑難排解），課程代碼 FW8010，發布於 2026 年 4 月。</p>", "p602": "<h3>章節導讀</h3><p>本章說明 Sophos Firewall 上報告產生的流程，以及如何排解常見問題。建議先備知識：如何在 Sophos Firewall 上執行並自訂報告。本章預計學習時間：5 分鐘。</p>", "p603": "<h3>報告產生流程</h3><p>Sophos Firewall 各子系統（驗證伺服器、代理、防火牆、VPN、IPS、應用程式篩選等）→ Garner（驗證事件門檻、轉發資料庫項目）→ 資料庫項目（PostgreSQL 記錄資料、SQLite 儲存事件資料）→ 報告（儀表板、應用程式、網路與威脅、郵件、合規報告等）。</p>", "p604": "<h3>情境：報告未產生（一）</h3><p>本情境探討當報告應有資料卻顯示無記錄時，該如何排解。</p>", "p605": "<h3>情境：報告未產生（二）：控制中心線索</h3><p>依根本原因不同，控制中心也可能顯示缺乏報告資料的情形；此處可看到服務圖示顯示為橘色，代表某項或多項服務發生問題。</p>", "p606": "<h3>情境：報告未產生（三）：檢查服務</h3><p>點擊控制中心的橘色服務圖示，可查看服務清單，發現「ReportDB」服務已停止。</p>", "p607": "<h3>情境：報告未產生（四）：指令檢查</h3><p>也可於進階命令列用指令 service -S | grep -e postgres -e garner -e reportdb 檢查報告所需服務的狀態；範例顯示 postgres 與 garner 為 RUNNING，reportdb 為 STOPPED；可用 service reportdb:start -ds nosync 啟動該服務。</p>", "p608": "<h3>情境：報告未產生（五）：確認本機報告已啟用</h3><p>可於主控台確認本機報告（On-box Reporting）是否已啟用（預設為啟用，但仍應確認）：指令 show on-box-reports；若顯示 off，可用 set on-box-reports on 啟用。</p>", "p609": "<h3>情境：報告未產生（六）：檢查保留期限</h3><p>若缺少資料的報告是過去時段的資料，須於「Data management」檢查日誌保留期限設定，確認該資料是否尚未過期並遭刪除。</p>", "p610": "<h3>情境：報告未產生（七）：檢查磁碟空間</h3><p>須確認報告分割區是否有足夠空間，可用主控台指令 system diagnostics show disk 查看各分割區使用率，範例顯示 report 分割區使用率已達 100%。</p>", "p611": "<h3>情境：報告未產生（八）：磁碟使用詳情</h3><p>可用指令 df -h 查看檔案系統使用情形，範例顯示各掛載點的大小、已用空間、可用空間與使用率百分比。</p>", "p612": "<h3>情境：報告未產生（九）：查找占用空間</h3><p>若 /var 分割區空間不足或已滿，可於進階命令列用指令 du -sh /var/* 查看空間使用分布，範例顯示 /var/tslog 目錄占用高達 68.8G 空間。</p>", "p613": "<h3>情境：報告未產生（十）：手動清除</h3><p>若須移除 Sophos Firewall 上的舊報告資料，可於報告設定的「Manual purge」頁籤操作：可依報告模組或全部報告清除、依自訂時間範圍清除（建議做法），或清除全部報告資料；不建議直接清除全部報告資料。</p>", "p614": "<h3>情境：報告未產生（十一）：問題解決</h3><p>服務全數正常運作、本機報告已啟用、且磁碟空間充足後，Sophos Firewall 即可恢復正常產生報告。</p>", "p615": "<h3>其他工具</h3><p>也可於主控台用指令 system diagnostics show subsystem-info 查看各子系統服務狀態，範例顯示 ReportDB 狀態為 RUNNING，並顯示目前的日誌使用量。</p>", "p616": "<h3>章節回顧</h3><p>Garner 是 Sophos Firewall 上負責接收並處理各子系統事件的日誌記錄應用程式；報告事件會儲存於資料庫，處理完成後即可供查詢。報告功能正常運作所需的三項服務為 postgres、garner 與 reportdb，可於進階命令列檢查是否有服務已停止。</p>", "p617": "<h3>章節結尾</h3><p>（Troubleshooting Reports 章節結束，亦為「日誌與報告」模組結束）</p>", "p618": "<h3>課程總結（一）</h3><p>（Course Review 章節分隔頁）</p>", "p619": "<h3>章節封面</h3><p>How To Find Help From Sophos（如何從 Sophos 尋求協助），版本 20.0v1，發布於 2024 年 4 月。</p>", "p620": "<h3>章節導讀</h3><p>本章說明如何取得 Sophos 產品的協助，以及如何隨時掌握 Sophos 最新消息與警訊。建議先備知識：本章無須具備任何先備知識或經驗。本章預計學習時間：6 分鐘。</p>", "p621": "<h3>如何尋求協助（一）</h3><p>如需支援，請前往 sophos.com/support，可存取文件、下載項目、訓練課程與支援方案；點擊「Go to Support Portal」即會導向支援入口網站。</p>", "p622": "<h3>如何尋求協助（二）</h3><p>總覽頁面提供快速連結，可存取支援入口網站、文件、技術影片，並可與客服人員線上對談，或查看 Sophos Central 狀態與最新惡意程式資訊；取得 Sophos 產品資訊與支援的管道有多種方式。</p>", "p623": "<h3>文件</h3><p>sophos.com/support/documentation 提供產品使用手冊、版本說明、隨身指南等各類實用文件。</p>", "p624": "<h3>知識庫</h3><p>support.sophos.com 為 Sophos 知識庫，提供針對特定設定與問題的技術文件。</p>", "p625": "<h3>Sophos 社群</h3><p>透過 Sophos 社群（community.sophos.com），可聯繫 Sophos 人員尋求協助，並參與討論、獲得支援；此論壇讓您能提出問題、分享知識，並與其他使用者交流 Sophos 產品的使用經驗。</p>", "p626": "<h3>SophosLabs</h3><p>sophos.com/labs 提供存取 Sophos 報告、即時資料與 Sophos 威脅報告的管道。</p>", "p627": "<h3>威脅資訊</h3><p>SophosLabs 維護一份已知威脅資料庫，可搜尋特定威脅並查看其特徵或傳播方式等重要資訊；威脅資料庫也提供移除該威脅的建議步驟。</p>", "p628": "<h3>Sophos TechVids</h3><p>techvids.sophos.com 提供一系列技術影片，涵蓋設定工作、自助排解、修復方式，以及常見問題的操作教學影片。</p>", "p629": "<h3>Sophos 技術支援</h3><p>遇以下情況可建立 Customer Care 案件：存取與支援入口網站問題、授權與訂購、更新聯絡資訊、MFA 重設。遇以下情況可建立 Technical Support 案件：無法自行解決的產品問題、進階硬體更換等。</p>", "p630": "<h3>建立支援案件的建議</h3><p>提出支援案件時，務必具體描述問題並提供已蒐集的所有資訊，以利支援團隊儘速協助；建立案件時應包含：所顯示的錯誤與症狀、重現問題的步驟、已執行的所有疑難排解步驟，以及已蒐集的所有日誌與補充資訊。</p>", "p631": "<h3>Sophos 消息與警訊</h3><p>我們希望您能掌握 Sophos 產品的所有動態，從使用技巧到更新與改進；可造訪 Sophos 社群與 Sophos News 部落格，掌握最新警訊與消息，亦可訂閱簡訊通知服務、RSS 訂閱源，並於 X 平台追蹤 Sophos。</p>", "p632": "<h3>Sophos News</h3><p>news.sophos.com 發布關於 Sophos、產品的最新消息，以及供媒體記者參考的最新資訊。</p>", "p633": "<h3>簡訊通知服務</h3><p>sms.sophos.com 提供的 Sophos 簡訊通知服務為免費服務，可針對 Sophos 產品與服務提供主動式簡訊警示，一旦發生問題即會立即通知您，讓您清楚了解狀況、影響範圍與解決方式。</p>", "p634": "<h3>RSS 訂閱</h3><p>sophos.com/company/rss-feeds。RSS（Really Simple Syndication）是一種傳遞持續更新的網頁內容的格式；我們將最新消息、產品公告與病毒警訊等內容以 RSS 訂閱源方式發布，可載入您的新聞閱讀器中查看。</p>", "p635": "<h3>X（原 Twitter）</h3><p>twitter.com/sophossupport。Sophos 使用 X 平台（原 Twitter）教育並連結合作夥伴、客戶與潛在客戶；透過社群媒體發送警示時，追蹤者可搜尋 #sophos 取得最新資訊。</p>", "p636": "<h3>章節回顧</h3><p>可透過 sophos.com/support 尋求協助。可透過支援入口網站、線上對談與 X 聯繫 Sophos 支援。可透過加入 Sophos 社群、訂閱簡訊或 RSS 訂閱源，掌握 Sophos 最新消息與警訊。</p>", "p637": "<h3>章節結尾</h3><p>（How To Find Help From Sophos 章節結束）</p>", "p638": "<h3>課程總結（二）：學習成果</h3><p>完成本課程後，您應已具備以下能力：將疑難排解流程套用於實際問題；運用 Sophos Firewall 提供的工具蒐集資訊並調查問題；於 Sophos Firewall 上找到並讀取日誌檔案；辨識並解決常見問題。若需複習任何章節，請於繼續之前返回相關章節。</p>", "p639": "<h3>課程總結（三）：測驗說明</h3><p>要完成認證課程，須完成並通過訓練入口網站上提供的線上評量；可於課程視窗右上角找到「Take Exam」按鈕。</p>", "p640": "<h3>課程總結（四）：測驗須知</h3><p>將顯示第一道題目，畫面左下角會顯示剩餘時間；可關閉視窗並從中斷處繼續作答，惟時間限制不會暫停；完成測驗後，點擊「Complete and Grade」即可。</p>", "p641": "<h3>課程總結（五）：問卷調查</h3><p>完成測驗後將看到問卷調查，請撥冗填寫。</p>", "p642": "<h3>課程總結（六）：訓練意見回饋</h3><p>非常歡迎針對課程提供意見回饋，請將您的建議寄至 globaltraining@sophos.com。</p>", "p643": "<h3>後續學習：認證課程</h3><p>Sophos 針對 Sophos Central 與 Sophos Firewall 提供多項認證課程：合作夥伴適用的 Sophos Certified Architect、Sophos Certified Engineer、Sophos Certified Technician；客戶適用的 Sophos Certified Administrator。</p>", "p644": "<h3>後續學習：免費技術訓練</h3><p>另提供一系列涵蓋各項 Sophos 產品與功能的隨選技術訓練課程，完全免費，可於訓練入口網站探索；欲查看可用課程，請前往 CERTIFICATIONS &gt; On-Demand Technical Training。</p>", "p645": "<h3>課程結尾</h3><p>（Sophos Firewall Sophos Certified Technician 課程結束）</p>"};

  function safeHash(i){ try{ history.replaceState(null,'','#p'+i); }catch(e){} }

  function activeModuleFor(i){
    var page = pages[i];
    return page ? page.getAttribute('data-module') : '0';
  }

  function syncTabs(i){
    var mod = activeModuleFor(i);
    tabButtons.forEach(function(b){
      b.classList.toggle('active', b.dataset.module === mod);
    });
  }

  function populateText(i){
    var page = pages[i];
    if(!page) return;
    var key = page.getAttribute('data-textkey');
    if(!key) return;
    var tc = page.querySelector('.slide-text-col');
    if(!tc) return;
    if(tc.getAttribute('data-filled') === '1') return;
    var html = TEXT_MAP[key];
    if(html){
      tc.innerHTML = html;
      
      var ui = document.createElement('div');
      ui.className = 'tts-controls';
      ui.innerHTML = '<button class="tts-toggle">▶ 朗讀</button><select class="tts-speed"><option value="0.75">0.75x</option><option value="1" selected>1.0x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select>';
      tc.insertBefore(ui, tc.firstChild);
      
      ui.querySelector('.tts-toggle').addEventListener('click', toggleTTS);
      var sel = ui.querySelector('.tts-speed');
      sel.value = ttsSpeed;
      sel.addEventListener('change', function(){
          ttsSpeed = parseFloat(this.value);
          updateTTSUI();
          if(ttsState === 'playing') speakIndex(current);
      });
      
      tc.setAttribute('data-filled', '1');
      updateTTSUI();
    }
  }

  function loadImagesFor(i){
    if(i < 0 || i > total-1) return;
    var page = pages[i];
    if(!page) return;
    var imgs = page.querySelectorAll('img.slide-img[data-src]');
    imgs.forEach(function(img){
      img.src = img.getAttribute('data-src');
      img.removeAttribute('data-src');
    });
  }

  function show(i, fromReading){
    try{
      if(i < 0) i = 0;
      if(i > total-1) i = total-1;
      if(pages[current]) pages[current].classList.remove('active');
      current = i;
      populateText(current);
      loadImagesFor(current);
      loadImagesFor(current+1);
      loadImagesFor(current-1);
      
      var page = pages[current];
      if (page.classList.contains('cover') && !page.querySelector('.tts-controls')) {
          var block = page.querySelector('.cover-block');
          if (block) {
              var ui = document.createElement('div');
              ui.className = 'tts-controls';
              ui.innerHTML = '<button class="tts-toggle">▶ 朗讀</button><select class="tts-speed"><option value="0.75">0.75x</option><option value="1" selected>1.0x</option><option value="1.25">1.25x</option><option value="1.5">1.5x</option></select>';
              block.appendChild(ui);
              ui.querySelector('.tts-toggle').addEventListener('click', toggleTTS);
              var sel = ui.querySelector('.tts-speed');
              sel.value = ttsSpeed;
              sel.addEventListener('change', function(){
                  ttsSpeed = parseFloat(this.value);
                  updateTTSUI();
                  if(ttsState === 'playing') speakIndex(current);
              });
              updateTTSUI();
          }
      }

      pages[current].classList.add('active');
      curIdxEl.textContent = current+1;
      prevBtn.classList.toggle('disabled', current===0);
      nextBtn.classList.toggle('disabled', current===total-1);
      safeHash(current);
      syncTabs(current);
      var tc = pages[current].querySelector('.slide-text-col');
      if(tc) tc.scrollTop = 0;
      
      if(fromReading === true) {
          // utterance.onend already handles the playback
          speakIndex(current);
      } else {
          if (ttsState === 'playing') {
              speakIndex(current);
          } else if (ttsState === 'paused') {
              speakToken++;
              synth.cancel();
          }
      }
    }catch(err){
      try{ console.error('show() failed at index', i, err); }catch(e2){}
    }
  }

  prevBtn.addEventListener('click', function(){ show(current-1); });
  nextBtn.addEventListener('click', function(){ show(current+1); });

  document.addEventListener('keydown', function(e){
    if(e.key === 'ArrowRight'){ show(current+1); }
    else if(e.key === 'ArrowLeft'){ show(current-1); }
  });

  tabButtons.forEach(function(btn){
    btn.addEventListener('click', function(){
      var mod = btn.dataset.module;
      if(moduleFirstIndex.hasOwnProperty(mod)){
        show(moduleFirstIndex[mod]);
      }
    });
  });

  // deep-link on load, e.g. #p120
  try{
    var h = location.hash ? location.hash.substring(1) : '';
    var m = h.match(/^p(\d+)$/);
    if(m){ show(parseInt(m[1],10)); } else { show(0); }
  }catch(e){ show(0); }

  // ---------- Tab bar drag / scroll ----------
  var tabScroll = document.getElementById('tabScroll');
  document.getElementById('arrowLeft').addEventListener('click', function(){
    tabScroll.scrollBy({left:-220, behavior:'smooth'});
  });
  document.getElementById('arrowRight').addEventListener('click', function(){
    tabScroll.scrollBy({left:220, behavior:'smooth'});
  });

  var isDown = false, startX, scrollLeft;
  tabScroll.addEventListener('mousedown', function(e){
    isDown = true; tabScroll.classList.add('dragging');
    startX = e.pageX - tabScroll.offsetLeft;
    scrollLeft = tabScroll.scrollLeft;
  });
  ['mouseleave','mouseup'].forEach(function(evt){
    tabScroll.addEventListener(evt, function(){ isDown=false; tabScroll.classList.remove('dragging'); });
  });
  tabScroll.addEventListener('mousemove', function(e){
    if(!isDown) return;
    e.preventDefault();
    var x = e.pageX - tabScroll.offsetLeft;
    var walk = (x - startX);
    tabScroll.scrollLeft = scrollLeft - walk;
  });
  tabScroll.addEventListener('wheel', function(e){
    if(Math.abs(e.deltaY) > Math.abs(e.deltaX)){
      tabScroll.scrollLeft += e.deltaY;
      e.preventDefault();
    }
  }, {passive:false});
  var touchStartX = 0, touchScrollLeft = 0;
  tabScroll.addEventListener('touchstart', function(e){
    touchStartX = e.touches[0].pageX; touchScrollLeft = tabScroll.scrollLeft;
  }, {passive:true});
  tabScroll.addEventListener('touchmove', function(e){
    var dx = e.touches[0].pageX - touchStartX;
    tabScroll.scrollLeft = touchScrollLeft - dx;
  }, {passive:true});
})();
</script>
</body>
</html>
